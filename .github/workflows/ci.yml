name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # The package-lock.json is generated on macOS and only contains
      # @rollup/rollup-darwin-arm64 as a fully resolved node_modules entry.
      # Both `npm ci` and `npm install` (when a lockfile is present) refuse to
      # install the missing platform-specific rollup native binary on the
      # Ubuntu runner — npm bug #4828. Removing the lockfile lets npm resolve
      # optional deps fresh against the runner's platform.
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build all packages
        run: npm run build
