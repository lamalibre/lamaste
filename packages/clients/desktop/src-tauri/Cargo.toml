[package]
name = "lamaste-desktop"
version = "2.0.0"
edition = "2021"

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-shell = "2"
tauri-plugin-deep-link = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["rustls-tls", "json", "blocking"], default-features = false }
rustls = "0.23"
rustls-pemfile = "2"
dirs = "5"
notify-rust = "4"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
# PKCE (RFC 7636) primitives for the user-access deep-link login flow.
# These crates are already in the dep graph via tauri/reqwest; declaring them
# directly so user_access.rs has stable, minimal-version pins.
rand = "0.9"
sha2 = "0.10"
base64 = "0.22"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "2"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
